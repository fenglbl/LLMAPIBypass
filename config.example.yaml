server:
  host: 127.0.0.1
  port: 8787
  requestBodyLimitBytes: 1048576
providers:
  - id: openai-main
    type: openai
    baseUrl: https://api.openai.com
    timeoutMs: 60000
    retryCount: 1
    supportsStreaming: true
    supportsImages: true
    supportsTools: true
  - id: anthropic-main
    type: anthropic
    baseUrl: https://api.anthropic.com
    timeoutMs: 60000
    retryCount: 1
    supportsStreaming: true
    supportsImages: true
    supportsTools: true
modelAliases:
  general-openai:
    provider: openai-main
    model: gpt-4.1
    targetProtocol: openai_responses
    defaults:
      maxTokens: 1024
  general-claude:
    provider: anthropic-main
    model: claude-sonnet-4-5
    targetProtocol: anthropic_messages
    defaults:
      maxTokens: 1024
